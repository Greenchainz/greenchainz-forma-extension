<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenChainz Forma Extension — Dev Preview</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .header img {
        width: 44px;
        height: 44px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #166534;
      }

      .subtitle {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 28px;
        text-align: center;
      }

      .badge {
        display: inline-block;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
        border-radius: 6px;
        font-size: 12px;
        padding: 4px 10px;
        margin-bottom: 28px;
      }

      .panels {
        display: flex;
        gap: 20px;
        width: 100%;
        max-width: 820px;
      }

      .panel-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .panel-label {
        font-size: 11px;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-align: center;
      }

      iframe {
        width: 100%;
        height: 640px;
        border: none;
        border-radius: 10px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.10);
        background: #fff;
      }

      @media (max-width: 640px) {
        .panels { flex-direction: column; }
        iframe  { height: 520px; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="/logo.svg" alt="GreenChainz" />
      <h1>GreenChainz</h1>
    </div>
    <p class="subtitle">Autodesk Forma Extension — EPD-verified materials &amp; carbon analysis</p>
    <span class="badge">⚠ Dev preview — runs inside Autodesk Forma in production</span>

    <div class="panels">
      <div class="panel-wrapper">
        <div class="panel-label">Left Panel — Material Search</div>
        <iframe src="/left.html" title="Material Search panel"></iframe>
      </div>
      <div class="panel-wrapper">
        <div class="panel-label">Right Panel — Carbon Analysis</div>
        <iframe src="/right.html" title="Carbon Analysis panel"></iframe>
      </div>
    </div>
  </body>
</html>
